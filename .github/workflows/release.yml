name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: linux-x64
          - platform: macos-latest
            artifact-name: macos-arm64
          - platform: macos-13
            artifact-name: macos-x64
          - platform: windows-latest
            artifact-name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: ignore

  sign-windows:
    needs: build
    if: ${{ vars.SIGNPATH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: unsigned/

      - name: Upload unsigned artifact for SignPath
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-unsigned
          path: unsigned/

      - name: Submit signing request to SignPath
        id: sign
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'azu'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed/'
          wait-for-completion-timeout-in-seconds: 600

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-signed
          path: signed/

  release:
    needs: [build, sign-windows]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download signed Windows artifacts
        id: signed
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-signed
          path: release-assets/
        continue-on-error: true

      - name: Download unsigned Windows artifacts (fallback)
        if: steps.signed.outcome == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release-assets/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: release-assets/
        continue-on-error: true

      - name: Download macOS ARM artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release-assets/
        continue-on-error: true

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: release-assets/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Azu ${{ github.ref_name }}'
          body: |
            ## Azu ${{ github.ref_name }}

            ### Downloads
            - **Windows** (.msi / .exe) ${{ steps.signed.outcome == 'success' && '— Signed with EV certificate via SignPath' || '— Unsigned' }}
            - **macOS** (.dmg) — Unsigned
            - **Linux** (.deb / .AppImage) — Unsigned

            See the [changelog](https://github.com/nikklasblz/Azu/commits/${{ github.ref_name }}) for details.
          draft: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
