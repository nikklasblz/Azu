<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#79b8ff"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="petalGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3d8bfd"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- Background circle (optional, for icon contexts) -->
  <circle cx="256" cy="256" r="240" fill="#0d1117"/>

  <!-- Center petal — pointing up (the main azucena petal / terminal cursor) -->
  <path d="M256 80 C256 80 296 160 296 230 C296 270 280 300 256 320 C232 300 216 270 216 230 C216 160 256 80 256 80Z"
        fill="url(#petalGrad)" opacity="0.95"/>

  <!-- Left petal — rotated -40deg around center -->
  <path d="M256 320 C232 300 180 280 140 300 C110 315 95 345 100 370 C105 395 130 400 160 390 C200 376 240 340 256 320Z"
        fill="url(#petalGrad2)" opacity="0.75"/>

  <!-- Right petal — rotated +40deg around center -->
  <path d="M256 320 C280 300 332 280 372 300 C402 315 417 345 412 370 C407 395 382 400 352 390 C312 376 272 340 256 320Z"
        fill="url(#petalGrad2)" opacity="0.75"/>

  <!-- Center stem dot — where petals meet -->
  <circle cx="256" cy="326" r="8" fill="#e6edf3" opacity="0.9"/>

  <!-- Subtle terminal cursor line below -->
  <rect x="236" y="390" width="40" height="3" rx="1.5" fill="#58a6ff" opacity="0.6"/>
</svg>
